<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jsmini playground</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1e1e1e;
  --panel: #252526;
  --border: #3c3c3c;
  --text: #cccccc;
  --text-muted: #808080;
  --accent: #569cd6;
  --green: #6a9955;
  --orange: #ce9178;
  --red: #f44747;
  --purple: #c586c0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-rows: 48px 1fr;
}

/* Header */
header {
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
#run-btn {
  padding: 6px 16px;
  background: #0e639c;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
#run-btn:hover { background: #1177bb; }
#run-btn:active { background: #0d5689; }
.shortcut-hint { font-size: 11px; color: var(--text-muted); }

/* Main layout */
main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}

/* Editor pane */
#editor-pane {
  border-right: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#editor-pane .cm-editor {
  flex: 1;
  height: 100%;
}
#editor-pane .cm-scroller { overflow: auto; }

/* Output pane */
#output-pane {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Tabs */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.tab-btn {
  padding: 8px 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-badge {
  font-size: 10px;
  background: var(--border);
  padding: 1px 5px;
  border-radius: 8px;
  margin-left: 4px;
}

/* Panels */
.panel { display: none; flex: 1; overflow: auto; padding: 12px; }
.panel.active { display: block; }

/* Token table */
#token-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", monospace;
}
#token-table th {
  text-align: left;
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
  font-weight: 500;
  position: sticky;
  top: 0;
  background: var(--panel);
}
#token-table td { padding: 3px 8px; }
#token-table tbody tr { cursor: pointer; }
#token-table tbody tr:hover { background: rgba(255,255,255,0.08); }
.tok-keyword { color: var(--accent); }
.tok-literal { color: var(--green); }
.tok-operator { color: var(--orange); }
.tok-delimiter { color: var(--text-muted); }
.tok-identifier { color: var(--text); }
.tok-eof { color: var(--text-muted); font-style: italic; }

/* AST panel */
#ast-container { position: relative; }
#ast-svg { display: block; }
#ast-svg .ast-node { cursor: pointer; }
#ast-svg .ast-node:hover rect { filter: brightness(1.3); }
.ast-zoom {
  position: sticky;
  top: 0;
  display: flex;
  gap: 4px;
  padding-bottom: 8px;
}
.ast-zoom button {
  padding: 2px 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
}

/* Result panel */
.log-line {
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 13px;
  padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.return-value {
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 13px;
}
.return-value span { color: var(--text); }
.error-box {
  background: rgba(244, 71, 71, 0.1);
  border: 1px solid var(--red);
  border-radius: 4px;
  padding: 8px 12px;
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 13px;
  color: var(--red);
  white-space: pre-wrap;
}
.empty-msg {
  color: var(--text-muted);
  font-style: italic;
  font-size: 13px;
}

/* Step controls */
.step-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.step-controls button {
  padding: 4px 10px;
  background: #333;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
}
.step-controls button:hover { background: #444; }
.step-controls button:disabled { opacity: 0.4; cursor: default; }
.step-counter {
  font-size: 12px;
  color: var(--text-muted);
  min-width: 80px;
}

/* Env panel */
.env-scope {
  margin-bottom: 12px;
}
.env-scope-title {
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 600;
}
.env-table {
  width: 100%;
  border-collapse: collapse;
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 12px;
}
.env-table td {
  padding: 2px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.env-var-name { color: var(--accent); }
.env-var-value { color: var(--green); }
.env-var-type { color: var(--text-muted); font-size: 10px; }

/* Bytecode panel */
.bytecode-dump {
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 12px;
  white-space: pre;
  line-height: 1.6;
}
.bytecode-dump .bc-header { color: var(--accent); font-weight: 600; }
.bytecode-dump .bc-addr { color: var(--text-muted); }
.bytecode-dump .bc-op { color: var(--orange); }
.bytecode-dump .bc-comment { color: var(--green); }
</style>
</head>
<body>
<header>
  <h1>jsmini playground</h1>
  <select id="preset-select" style="padding:4px 8px;background:#333;color:#ccc;border:1px solid #3c3c3c;border-radius:3px;font-size:12px;">
    <option value="">Preset...</option>
    <option value="fibonacci">Fibonacci</option>
    <option value="sum">Sum Loop</option>
    <option value="quicksort">Quicksort</option>
    <option value="map-reduce">Map / Reduce</option>
    <option value="class">Class</option>
    <option value="demo">Full Demo</option>
  </select>
  <select id="mode-select" style="padding:4px 8px;background:#333;color:#ccc;border:1px solid #3c3c3c;border-radius:3px;font-size:12px;">
    <option value="tree-walking">Tree-Walking</option>
    <option value="vm">Bytecode VM</option>
    <option value="wasm-jit">Wasm JIT</option>
  </select>
  <button id="run-btn">Run</button>
  <span class="shortcut-hint">Cmd+Enter</span>
  <div class="step-controls">
    <button id="step-back-btn" disabled>&lt;</button>
    <button id="step-fwd-btn" disabled>Step &gt;</button>
    <button id="step-reset-btn" disabled>Reset</button>
    <span id="step-counter" class="step-counter"></span>
  </div>
</header>
<main>
  <div id="editor-pane"></div>
  <div id="output-pane">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="tokens">Tokens <span id="badge-tokens" class="tab-badge"></span></button>
      <button class="tab-btn" data-tab="ast">AST <span id="badge-ast" class="tab-badge"></span></button>
      <button class="tab-btn" data-tab="bytecode">Bytecode</button>
      <button class="tab-btn" data-tab="result">Result</button>
      <button class="tab-btn" data-tab="env">Env</button>
    </div>
    <div id="panel-tokens" class="panel active">
      <p class="empty-msg">Run to see tokens</p>
    </div>
    <div id="panel-ast" class="panel">
      <p class="empty-msg">Run to see AST</p>
    </div>
    <div id="panel-bytecode" class="panel">
      <p class="empty-msg">Run in VM mode to see bytecode</p>
    </div>
    <div id="panel-result" class="panel">
      <p class="empty-msg">Run to see result</p>
    </div>
    <div id="panel-env" class="panel">
      <p class="empty-msg">Run then use Step to see environment</p>
    </div>
  </div>
</main>

<script src="jsmini.bundle.js"></script>
<script>
const { basicSetup, javascript, oneDark, EditorView, keymap, Prec, StateEffect, StateField, Decoration, RangeSet,
        vmEvaluate, compile, disassemble, disassembleToWat } = jsmini;

// ========== Step highlight decoration ==========
const setStepHighlight = StateEffect.define();
const clearStepHighlight = StateEffect.define();

const stepLineDeco = Decoration.line({ class: "cm-step-line" });
const stepTextDeco = Decoration.mark({ class: "cm-step-text" });

const stepHighlightField = StateField.define({
  create() { return Decoration.none; },
  update(decos, tr) {
    for (const e of tr.effects) {
      if (e.is(clearStepHighlight)) return Decoration.none;
      if (e.is(setStepHighlight)) {
        const { from, to } = e.value;
        const doc = tr.state.doc;
        const startLine = doc.lineAt(from);
        const endLine = doc.lineAt(to);
        const marks = [];
        // 行ごとに背景をつける
        for (let ln = startLine.number; ln <= endLine.number; ln++) {
          marks.push(stepLineDeco.range(doc.line(ln).from));
        }
        // テキスト範囲をマーク
        marks.push(stepTextDeco.range(from, to));
        marks.sort((a, b) => a.from - b.from || a.startSide - b.startSide);
        return RangeSet.of(marks);
      }
    }
    return decos;
  },
  provide: f => EditorView.decorations.from(f),
});

// ========== Presets ==========
const PRESETS = {
  fibonacci: `// Fibonacci - recursive (JIT eligible)
function fib(n) {
  if (n <= 1) { return n; }
  return fib(n - 1) + fib(n - 2);
}
console.log(fib(25));`,

  sum: `// Sum loop (JIT eligible)
function sumLoop(n) {
  var sum = 0;
  for (var i = 0; i < n; i = i + 1) {
    sum = sum + i;
  }
  return sum;
}
console.log(sumLoop(10000));`,

  quicksort: `// Quicksort
function swap(arr, i, j) {
  var tmp = arr[i];
  arr[i] = arr[j];
  arr[j] = tmp;
}

function partition(arr, lo, hi) {
  var pivot = arr[hi];
  var i = lo;
  for (var j = lo; j < hi; j = j + 1) {
    if (arr[j] <= pivot) {
      swap(arr, i, j);
      i = i + 1;
    }
  }
  swap(arr, i, hi);
  return i;
}

function qsort(arr, lo, hi) {
  if (lo < hi) {
    var p = partition(arr, lo, hi);
    qsort(arr, lo, p - 1);
    qsort(arr, p + 1, hi);
  }
}

function runSort(n, seed) {
  var arr = [];
  var s = seed;
  for (var i = 0; i < n; i = i + 1) {
    s = (s * 1103515245 + 12345) % 2147483648;
    if (s < 0) { s = s + 2147483648; }
    arr[i] = s % 1000;
  }
  qsort(arr, 0, arr.length - 1);
  return arr;
}

// 5 回実行 (JIT warmup + 本実行)
var result = [];
for (var r = 0; r < 5; r = r + 1) {
  result = runSort(100, r * 777 + 42);
}
console.log(result);`,

  "map-reduce": `// Map / Reduce
function map(arr, fn) {
  var result = [];
  for (var i = 0; i < arr.length; i = i + 1) {
    result[i] = fn(arr[i]);
  }
  return result;
}

function reduce(arr, fn, init) {
  var acc = init;
  for (var i = 0; i < arr.length; i = i + 1) {
    acc = fn(acc, arr[i]);
  }
  return acc;
}

var nums = [1, 2, 3, 4, 5];
var doubled = map(nums, function dbl(x) { return x * 2; });
var sum = reduce(doubled, function add(a, b) { return a + b; }, 0);
console.log("doubled: " + doubled[0] + "," + doubled[1] + "," + doubled[2] + "," + doubled[3] + "," + doubled[4]);
console.log("sum: " + sum);`,

  "class": `// Class - Vec2D
class Vec {
  constructor(x, y) {
    this.x = x;
    this.y = y;
  }
  add(other) {
    return new Vec(this.x + other.x, this.y + other.y);
  }
  dot(other) {
    return this.x * other.x + this.y * other.y;
  }
}

var sum = new Vec(0, 0);
for (var i = 0; i < 10; i = i + 1) {
  sum = sum.add(new Vec(i, i * 2));
}
console.log(\`sum = (\${sum.x}, \${sum.y})\`);
console.log(\`dot(1,1) = \${sum.dot(new Vec(1, 1))}\`);`,
};

// ========== CodeMirror setup ==========
const defaultCode = `// jsmini playground - Phase 3 demo

// Phase 1: var, function, if/else, for, console.log
var x = 10;
function double(n) { return n * 2; }
console.log(double(x));

// Phase 2: let/const, object, array, try/catch, typeof
let point = { x: 1, y: 2 };
const nums = [10, 20, 30];
console.log(point.x + point.y);
console.log(nums.length);
console.log(typeof point);

try {
  throw new Error("oops");
} catch (e) {
  console.log(e.message);
}

// Phase 3: arrow, template literal, class, for...of, destructuring
const add = (a, b) => a + b;
console.log(\`add(3,4) = \${add(3, 4)}\`);

class Counter {
  constructor(start) {
    this.count = start;
  }
  increment() {
    this.count = this.count + 1;
    return this.count;
  }
}

const c = new Counter(0);
console.log(c.increment());
console.log(c.increment());

const arr = [1, 2, 3];
let sum = 0;
for (const n of arr) {
  sum = sum + n;
}
console.log(\`sum = \${sum}\`);

const { x: px, y: py } = point;
console.log(\`point: (\${px}, \${py})\`);
`;

const runKeymap = Prec.highest(keymap.of([{
  key: "Mod-Enter",
  run: () => { runCode(); return true; }
}]));

const stepHighlightTheme = EditorView.baseTheme({
  ".cm-step-line": {
    backgroundColor: "rgba(86, 156, 214, 0.15)",
  },
  ".cm-step-text": {
    backgroundColor: "rgba(86, 156, 214, 0.35)",
    borderBottom: "2px solid #569cd6",
  },
});

const view = new EditorView({
  doc: defaultCode,
  extensions: [basicSetup, javascript(), oneDark, runKeymap, stepHighlightField, stepHighlightTheme],
  parent: document.getElementById("editor-pane"),
});

// ========== Tab switching ==========
const tabBtns = document.querySelectorAll(".tab-btn");
const panels = {
  tokens: document.getElementById("panel-tokens"),
  ast: document.getElementById("panel-ast"),
  bytecode: document.getElementById("panel-bytecode"),
  result: document.getElementById("panel-result"),
  env: document.getElementById("panel-env"),
};

function switchTab(name) {
  tabBtns.forEach(b => b.classList.toggle("active", b.dataset.tab === name));
  Object.entries(panels).forEach(([k, el]) => el.classList.toggle("active", k === name));
}

tabBtns.forEach(btn => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));

// ========== Preset switching ==========
document.getElementById("preset-select").addEventListener("change", (e) => {
  const key = e.target.value;
  if (key && PRESETS[key]) {
    view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: PRESETS[key] } });
    e.target.value = ""; // reset selector
    runCode();
  }
});

// ========== Token rendering ==========
const KEYWORD_TYPES = new Set(["Var","If","Else","True","False","Null","While","For","Function","Return"]);
const LITERAL_TYPES = new Set(["Number","String"]);
const OPERATOR_TYPES = new Set(["Plus","Minus","Star","Slash","Percent","Equals","EqualEqual","EqualEqualEqual","Bang","BangEqual","BangEqualEqual","Less","Greater","LessEqual","GreaterEqual","AmpersandAmpersand","PipePipe"]);
const DELIMITER_TYPES = new Set(["LeftParen","RightParen","LeftBrace","RightBrace","LeftBracket","RightBracket","Colon","Dot","Comma","Semicolon"]);

function tokenClass(type) {
  if (type === "EOF") return "tok-eof";
  if (KEYWORD_TYPES.has(type)) return "tok-keyword";
  if (LITERAL_TYPES.has(type)) return "tok-literal";
  if (OPERATOR_TYPES.has(type)) return "tok-operator";
  if (DELIMITER_TYPES.has(type)) return "tok-delimiter";
  return "tok-identifier";
}

function renderTokens(tokens, container) {
  let html = `<table id="token-table"><thead><tr><th>#</th><th>Type</th><th>Value</th><th>Line</th><th>Col</th></tr></thead><tbody>`;
  tokens.forEach((t, i) => {
    const cls = tokenClass(t.type);
    const val = t.type === "EOF" ? "" : escapeHtml(t.value);
    html += `<tr data-token-idx="${i}"><td>${i}</td><td class="${cls}">${t.type}</td><td>${val}</td><td>${t.line}</td><td>${t.column}</td></tr>`;
  });
  html += `</tbody></table>`;
  container.innerHTML = html;

  // Token クリック → エディタハイライト
  container.querySelectorAll("tr[data-token-idx]").forEach(row => {
    row.addEventListener("click", () => {
      const idx = Number(row.dataset.tokenIdx);
      const t = tokens[idx];
      if (t.type === "EOF") return;
      const from = tokenCharOffset(t);
      const to = from + tokenSourceLength(t);
      highlightRange(from, to);
    });
  });
}

// ========== AST rendering (SVG) ==========
const NODE_W = 130;
const NODE_H = 44;
const V_GAP = 40;
const H_GAP = 12;

const CHILD_FIELDS = {
  Program: ["body"],
  ExpressionStatement: ["expression"],
  VariableDeclaration: ["declarations"],
  VariableDeclarator: ["id", "init"],
  FunctionDeclaration: ["id", "params", "body"],
  BlockStatement: ["body"],
  IfStatement: ["test", "consequent", "alternate"],
  WhileStatement: ["test", "body"],
  ForStatement: ["init", "test", "update", "body"],
  ReturnStatement: ["argument"],
  BinaryExpression: ["left", "right"],
  LogicalExpression: ["left", "right"],
  UnaryExpression: ["argument"],
  AssignmentExpression: ["left", "right"],
  CallExpression: ["callee", "arguments"],
  MemberExpression: ["object", "property"],
  ObjectExpression: ["properties"],
  ArrayExpression: ["elements"],
  Property: ["key", "value"],
  Literal: [],
  Identifier: [],
};

const NODE_COLORS = {
  Program: "#2d4a7a", BlockStatement: "#2d4a7a",
  ExpressionStatement: "#2d4a7a", VariableDeclaration: "#2d4a7a", VariableDeclarator: "#2d4a7a",
  FunctionDeclaration: "#3a5e3a",
  IfStatement: "#5a3e6b", WhileStatement: "#5a3e6b", ForStatement: "#5a3e6b", ReturnStatement: "#5a3e6b",
  BinaryExpression: "#3a5e3a", LogicalExpression: "#3a5e3a", UnaryExpression: "#3a5e3a",
  AssignmentExpression: "#3a5e3a", CallExpression: "#3a5e3a", MemberExpression: "#3a5e3a",
  ObjectExpression: "#3a5e3a", ArrayExpression: "#3a5e3a", Property: "#3a5e3a",
  Literal: "#6b4226", Identifier: "#6b4226",
};

// トークンカーソル: AST の葉ノードを左から右へトークンとマッチさせる
let _tokenCursor = 0;
let _tokensForAST = [];

// 葉ノードにマッチするトークンタイプ
const LEAF_TOKEN_MAP = {
  Literal: new Set(["Number", "String", "True", "False", "Null"]),
  Identifier: new Set(["Identifier"]),
};

function matchLeafToken(node) {
  const expected = LEAF_TOKEN_MAP[node.type];
  if (!expected) return null;
  while (_tokenCursor < _tokensForAST.length) {
    const t = _tokensForAST[_tokenCursor];
    if (expected.has(t.type)) {
      _tokenCursor++;
      return t;
    }
    _tokenCursor++;
  }
  return null;
}

function astToDisplayTree(node) {
  if (!node || typeof node !== "object" || !node.type) return null;

  let label = node.type;
  if (node.type === "Literal") label += `(${JSON.stringify(node.value)})`;
  else if (node.type === "Identifier") label += `(${node.name})`;
  else if (node.type === "BinaryExpression" || node.type === "LogicalExpression")
    label += ` ${node.operator}`;
  else if (node.type === "UnaryExpression") label += ` ${node.operator}`;
  else if (node.type === "AssignmentExpression") label += ` ${node.operator}`;
  else if (node.type === "VariableDeclaration") label += ` ${node.kind}`;

  const children = [];
  const fields = CHILD_FIELDS[node.type] || [];
  for (const field of fields) {
    const val = node[field];
    if (val == null) continue;
    if (Array.isArray(val)) {
      for (const item of val) {
        const child = astToDisplayTree(item);
        if (child) children.push(child);
      }
    } else {
      const child = astToDisplayTree(val);
      if (child) children.push(child);
    }
  }

  // ソース位置: 葉ノードはトークンからマッチ、非葉は子から集約
  let sourceStart = Infinity, sourceEnd = -1;
  if (children.length === 0) {
    const token = matchLeafToken(node);
    if (token) {
      sourceStart = tokenCharOffset(token);
      sourceEnd = sourceStart + tokenSourceLength(token);
    }
  } else {
    for (const c of children) {
      if (c.sourceStart < sourceStart) sourceStart = c.sourceStart;
      if (c.sourceEnd > sourceEnd) sourceEnd = c.sourceEnd;
    }
  }

  return { label, type: node.type, children, x: 0, y: 0, width: 0, sourceStart, sourceEnd };
}

function subtreeWidth(node) {
  if (node.children.length === 0) return NODE_W;
  let total = 0;
  for (const c of node.children) total += subtreeWidth(c);
  total += (node.children.length - 1) * H_GAP;
  return Math.max(NODE_W, total);
}

function assignPositions(node, leftX, y) {
  const sw = subtreeWidth(node);
  node.x = leftX + sw / 2 - NODE_W / 2;
  node.y = y;
  node.width = sw;

  let cx = leftX;
  for (const child of node.children) {
    const cw = subtreeWidth(child);
    assignPositions(child, cx, y + NODE_H + V_GAP);
    cx += cw + H_GAP;
  }
}

function countNodes(node) {
  let count = 1;
  for (const c of node.children) count += countNodes(c);
  return count;
}

function renderASTSvg(root, container) {
  assignPositions(root, 20, 20);

  // compute dimensions
  let maxX = 0, maxY = 0;
  function scan(n) {
    maxX = Math.max(maxX, n.x + NODE_W);
    maxY = Math.max(maxY, n.y + NODE_H);
    n.children.forEach(scan);
  }
  scan(root);

  const w = maxX + 40;
  const h = maxY + 40;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" id="ast-svg">`;

  // edges first
  function drawEdges(n) {
    const px = n.x + NODE_W / 2;
    const py = n.y + NODE_H;
    for (const c of n.children) {
      const cx = c.x + NODE_W / 2;
      const cy = c.y;
      svg += `<line x1="${px}" y1="${py}" x2="${cx}" y2="${cy}" stroke="#555" stroke-width="1.5"/>`;
      drawEdges(c);
    }
  }
  drawEdges(root);

  // nodes (clickable groups)
  let nodeId = 0;
  const nodeMap = {};
  function drawNodes(n) {
    const id = nodeId++;
    nodeMap[id] = n;
    const color = NODE_COLORS[n.type] || "#444";
    svg += `<g class="ast-node" data-node-id="${id}">`;
    svg += `<rect x="${n.x}" y="${n.y}" width="${NODE_W}" height="${NODE_H}" rx="6" fill="${color}" stroke="#666" stroke-width="1"/>`;
    let display = n.label;
    if (display.length > 18) display = display.slice(0, 17) + "...";
    svg += `<text x="${n.x + NODE_W/2}" y="${n.y + NODE_H/2 + 4}" text-anchor="middle" fill="#eee" font-size="11" font-family="monospace">${escapeHtml(display)}</text>`;
    svg += `</g>`;
    n.children.forEach(drawNodes);
  }
  drawNodes(root);

  svg += `</svg>`;

  // zoom controls
  let scale = 1;
  container.innerHTML = `<div class="ast-zoom">
    <button id="zoom-in">+</button>
    <button id="zoom-out">-</button>
    <button id="zoom-reset">Reset</button>
  </div><div id="ast-scroll" style="overflow:auto;flex:1">${svg}</div>`;

  const svgEl = container.querySelector("#ast-svg");
  container.querySelector("#zoom-in").onclick = () => { scale = Math.min(scale + 0.2, 3); svgEl.style.transform = `scale(${scale})`; svgEl.style.transformOrigin = "0 0"; };
  container.querySelector("#zoom-out").onclick = () => { scale = Math.max(scale - 0.2, 0.2); svgEl.style.transform = `scale(${scale})`; svgEl.style.transformOrigin = "0 0"; };
  container.querySelector("#zoom-reset").onclick = () => { scale = 1; svgEl.style.transform = ""; };

  // AST ノードクリック → エディタハイライト
  container.querySelectorAll(".ast-node").forEach(g => {
    g.addEventListener("click", () => {
      const n = nodeMap[g.dataset.nodeId];
      if (n && n.sourceStart < Infinity && n.sourceEnd > -1) {
        highlightRange(n.sourceStart, n.sourceEnd);
      }
    });
  });
}

// ========== Result rendering ==========
function renderResult(logs, returnValue, error, container, execTime, mode, jitInfo) {
  let html = "";
  if (error) {
    html += `<div class="error-box">${escapeHtml(error)}</div>`;
  }
  if (logs.length > 0) {
    for (const args of logs) {
      const text = args.map(a => typeof a === "object" && a !== null ? JSON.stringify(a, null, 2) : String(a)).join(" ");
      html += `<div class="log-line">${escapeHtml(text)}</div>`;
    }
  }
  if (!error) {
    html += `<div class="return-value">Return: <span>${escapeHtml(formatValue(returnValue))}</span></div>`;
  }
  if (execTime !== undefined) {
    html += `<div class="return-value" style="color:var(--orange);">${escapeHtml(mode)}: <span>${execTime.toFixed(2)}ms</span></div>`;
  }
  if (jitInfo) {
    const { tierLog, feedback } = jitInfo;
    // Tier transitions を集約表示
    const wasmCompiled = tierLog.filter(l => l.includes("Wasm compiled"));
    const deopt = tierLog.filter(l => l.includes("DEOPT"));
    const wasmCalls = tierLog.filter(l => l.includes("[TIER]") && l.includes(": Wasm (")).length;
    const vmCalls = tierLog.filter(l => l.includes(": Bytecode VM")).length;

    html += `<div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border);">`;
    html += `<div style="font-size:11px;color:var(--accent);text-transform:uppercase;font-weight:600;margin-bottom:6px;">JIT Info</div>`;
    html += `<div style="font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;">`;

    // コンパイル情報
    if (wasmCompiled.length > 0) {
      for (const line of wasmCompiled) {
        html += `<div style="color:var(--green);">${escapeHtml(line)}</div>`;
      }
    } else {
      html += `<div style="color:var(--text-muted);">No functions compiled to Wasm</div>`;
    }

    // 呼び出し統計
    html += `<div style="color:var(--text-muted);margin-top:4px;">Wasm calls: ${wasmCalls} / VM calls: ${vmCalls}</div>`;

    // 脱最適化
    if (deopt.length > 0) {
      for (const line of deopt) {
        html += `<div style="color:var(--red);">${escapeHtml(line)}</div>`;
      }
    }

    // フィードバック
    if (feedback && feedback.dump) {
      html += `<div style="margin-top:6px;color:var(--text-muted);">Type Feedback:</div>`;
      html += `<pre style="color:var(--purple);font-size:11px;margin-top:2px;">${escapeHtml(feedback.dump())}</pre>`;
    }

    html += `</div></div>`;
  }
  if (!error && logs.length === 0 && !jitInfo) {
    html += `<p class="empty-msg">No console output</p>`;
  }
  container.innerHTML = html;
}

function formatValue(val) {
  if (val === undefined) return "undefined";
  if (val === null) return "null";
  if (typeof val === "object") return JSON.stringify(val, null, 2);
  return String(val);
}

// ========== Bytecode rendering ==========
function renderBytecode(dump, container) {
  // disassemble の出力をシンタックスハイライト
  const lines = dump.split("\n").map(line => {
    // == <name> (params: N, locals: N) == → ヘッダー
    if (line.match(/^(\s*)== .+ ==/)) {
      return `<span class="bc-header">${escapeHtml(line)}</span>`;
    }
    // 0000: OpCode  operand ; comment
    const m = line.match(/^(\s*\d{4}: )(\S+)(.*?)(;.*)?$/);
    if (m) {
      let result = `<span class="bc-addr">${escapeHtml(m[1])}</span><span class="bc-op">${escapeHtml(m[2])}</span>`;
      if (m[3]) result += escapeHtml(m[3]);
      if (m[4]) result += `<span class="bc-comment">${escapeHtml(m[4])}</span>`;
      return result;
    }
    return escapeHtml(line);
  });
  container.innerHTML = `<div class="bytecode-dump">${lines.join("\n")}</div>`;
}

function escapeHtml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ========== Source highlight ==========
// ソースの行開始オフセットテーブルを構築
function computeLineOffsets(source) {
  const offsets = [0];
  for (let i = 0; i < source.length; i++) {
    if (source[i] === "\n") offsets.push(i + 1);
  }
  return offsets;
}

let lastLineOffsets = [];
let lastSource = "";

function highlightRange(from, to) {
  view.dispatch({
    effects: setStepHighlight.of({ from, to }),
    selection: { anchor: from, head: to },
    scrollIntoView: true,
  });
  view.focus();
}

function clearHighlight() {
  view.dispatch({ effects: clearStepHighlight.of(null) });
}

function tokenCharOffset(token) {
  if (token.line - 1 >= lastLineOffsets.length) return 0;
  return lastLineOffsets[token.line - 1] + (token.column - 1);
}

function tokenSourceLength(token) {
  if (token.type === "String") return token.value.length + 2; // quotes
  if (token.type === "EOF") return 0;
  return token.value.length;
}

// ========== Run ==========
function runCode() {
  clearHighlight();
  const source = view.state.doc.toString();
  lastSource = source;
  lastLineOffsets = computeLineOffsets(source);

  // Tokens
  let tokens = null;
  try {
    tokens = jsmini.tokenize(source);
    renderTokens(tokens, panels.tokens);
    document.getElementById("badge-tokens").textContent = tokens.length;
  } catch (e) {
    panels.tokens.innerHTML = `<div class="error-box">${escapeHtml(e.message)}</div>`;
    document.getElementById("badge-tokens").textContent = "!";
  }

  // AST
  let ast = null;
  try {
    ast = jsmini.parse(source);
    _tokenCursor = 0;
    _tokensForAST = tokens || [];
    const displayTree = astToDisplayTree(ast);
    if (displayTree) {
      document.getElementById("badge-ast").textContent = countNodes(displayTree);
      renderASTSvg(displayTree, panels.ast);
    }
  } catch (e) {
    panels.ast.innerHTML = `<div class="error-box">${escapeHtml(e.message)}</div>`;
    document.getElementById("badge-ast").textContent = "!";
  }

  const mode = document.getElementById("mode-select").value;
  const isVM = mode === "vm" || mode === "wasm-jit";

  // Bytecode (VM / Wasm JIT mode)
  if (isVM) {
    try {
      const func = compile(source);
      const dump = disassemble(func);
      renderBytecode(dump, panels.bytecode);

      // Wasm JIT モード: WAT も表示
      if (mode === "wasm-jit") {
        let watHtml = "";
        for (const c of func.constants) {
          if (c && typeof c === "object" && "bytecode" in c && "name" in c) {
            const wat = disassembleToWat(c, "i32");
            if (wat) {
              watHtml += `<div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border);">`;
              watHtml += `<div style="font-size:11px;color:var(--green);text-transform:uppercase;font-weight:600;margin-bottom:4px;">WAT — ${escapeHtml(c.name)}</div>`;
              watHtml += `<pre style="font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:var(--text);line-height:1.6;white-space:pre;">${escapeHtml(wat)}</pre>`;
              watHtml += `</div>`;
            } else {
              watHtml += `<div style="margin-top:8px;color:var(--text-muted);font-size:12px;">WAT — ${escapeHtml(c.name)}: JIT 非対応 (未サポートの opcode あり)</div>`;
            }
          }
        }
        if (watHtml) {
          panels.bytecode.innerHTML += watHtml;
        }
      }
    } catch (e) {
      panels.bytecode.innerHTML = `<div class="error-box">${escapeHtml(e.message)}</div>`;
    }
  } else {
    panels.bytecode.innerHTML = `<p class="empty-msg">Switch to VM or Wasm JIT mode to see bytecode</p>`;
  }

  // Result + Step 記録
  const logs = [];
  let returnValue;
  let error = null;
  let jitInfo = null;
  steps = [];
  stepIndex = -1;
  const execStart = performance.now();
  try {
    if (mode === "wasm-jit") {
      const jitResult = vmEvaluate(source, {
        console: { log: (...args) => logs.push(args) },
        jit: true,
        jitThreshold: 5,
        collectFeedback: true,
        traceTier: true,
      });
      returnValue = jitResult.value;
      jitInfo = { tierLog: jitResult.tierLog || [], feedback: jitResult.feedback || null };
    } else if (mode === "vm") {
      returnValue = vmEvaluate(source, { console: { log: (...args) => logs.push(args) } });
    } else {
      returnValue = jsmini.evaluate(source, {
        console: { log: (...args) => logs.push(args) },
        onStep: (info) => steps.push(info),
      });
    }
  } catch (e) {
    error = `${e.constructor?.name || "Error"}: ${e.message}`;
  }
  const execTime = performance.now() - execStart;
  const modeLabels = { "tree-walking": "Tree-Walking", "vm": "Bytecode VM", "wasm-jit": "Wasm JIT" };
  renderResult(logs, returnValue, error, panels.result, execTime, modeLabels[mode] || mode, jitInfo);

  // Step 用のソース範囲を事前計算 (tree-walking only)
  if (mode === "tree-walking" && tokens && ast) {
    stmtSourceRanges = collectStatementRanges(ast, tokens);
  }

  // Step UI 初期化
  if (steps.length > 0) {
    stepIndex = steps.length - 1;
    updateStepUI();
  } else {
    updateStepUI();
  }

  // タブは切り替えない (ユーザーが選んだタブを維持)
}

// ========== Step execution ==========
let steps = [];
let stepIndex = -1;
// 各ステップの文の位置を記録するために、AST の文を事前に走査
let stmtSourceRanges = [];

function collectStatementRanges(ast, tokens) {
  // AST の全文を深さ優先で走査し、文の種類と順番を記録
  // 対応する行をトークンの位置からヒューリスティックに推定
  const ranges = [];
  let tIdx = 0;

  function findTokenByLine(stmtType) {
    // 次のキーワードトークンを探す
    const keywordMap = {
      VariableDeclaration: new Set(["Var"]),
      FunctionDeclaration: new Set(["Function"]),
      ReturnStatement: new Set(["Return"]),
      IfStatement: new Set(["If"]),
      WhileStatement: new Set(["While"]),
      ForStatement: new Set(["For"]),
      ExpressionStatement: null, // 次のトークンなんでも
    };
    const expected = keywordMap[stmtType];
    while (tIdx < tokens.length) {
      const t = tokens[tIdx];
      if (t.type === "EOF") break;
      if (!expected || expected.has(t.type)) {
        const start = tokenCharOffset(t);
        // 文の終わりは次のセミコロンか閉じ波括弧まで
        let end = start + tokenSourceLength(t);
        // 次のセミコロンまでスキャン
        for (let j = tIdx + 1; j < tokens.length; j++) {
          const tj = tokens[j];
          end = tokenCharOffset(tj) + tokenSourceLength(tj);
          if (tj.type === "Semicolon" || tj.type === "RightBrace") break;
        }
        tIdx++;
        return { start, end };
      }
      tIdx++;
    }
    return null;
  }

  function walkStmts(stmts) {
    for (const stmt of stmts) {
      if (stmt.type === "BlockStatement") {
        walkStmts(stmt.body);
      } else if (stmt.type === "IfStatement") {
        ranges.push(findTokenByLine("IfStatement"));
        walkStmts([stmt.consequent]);
        if (stmt.alternate) walkStmts([stmt.alternate]);
      } else if (stmt.type === "WhileStatement") {
        ranges.push(findTokenByLine("WhileStatement"));
        walkStmts([stmt.body]);
      } else if (stmt.type === "ForStatement") {
        ranges.push(findTokenByLine("ForStatement"));
        walkStmts([stmt.body]);
      } else if (stmt.type === "FunctionDeclaration") {
        ranges.push(findTokenByLine("FunctionDeclaration"));
        // body の中身は呼び出し時に実行されるので事前走査しない
      } else {
        ranges.push(findTokenByLine(stmt.type));
      }
    }
  }
  walkStmts(ast.body);
  return ranges;
}

function renderEnv(envDump) {
  if (!envDump || envDump.length === 0) {
    panels.env.innerHTML = `<p class="empty-msg">No variables</p>`;
    return;
  }
  let html = "";
  for (const { scope, variables } of envDump) {
    html += `<div class="env-scope"><div class="env-scope-title">${escapeHtml(scope)}</div>`;
    html += `<table class="env-table">`;
    for (const [name, value] of Object.entries(variables)) {
      const type = value === null ? "null" : typeof value;
      const display = value === undefined ? "undefined"
        : value === null ? "null"
        : typeof value === "string" ? `"${value}"`
        : String(value);
      html += `<tr><td class="env-var-name">${escapeHtml(name)}</td><td class="env-var-value">${escapeHtml(display)}</td><td class="env-var-type">${type}</td></tr>`;
    }
    html += `</table></div>`;
  }
  panels.env.innerHTML = html;
}

function updateStepUI() {
  const backBtn = document.getElementById("step-back-btn");
  const fwdBtn = document.getElementById("step-fwd-btn");
  const resetBtn = document.getElementById("step-reset-btn");
  const counter = document.getElementById("step-counter");

  if (steps.length === 0) {
    backBtn.disabled = true;
    fwdBtn.disabled = true;
    resetBtn.disabled = true;
    counter.textContent = "";
    return;
  }

  backBtn.disabled = stepIndex <= 0;
  fwdBtn.disabled = stepIndex >= steps.length - 1;
  resetBtn.disabled = false;
  counter.textContent = `${stepIndex + 1} / ${steps.length}`;

  // 現在のステップの環境を表示
  if (stepIndex >= 0 && stepIndex < steps.length) {
    renderEnv(steps[stepIndex].env);
    // 対応するソース範囲をハイライト
    const range = stmtSourceRanges[stepIndex];
    if (range) {
      highlightRange(range.start, range.end);
    }
  }
}

document.getElementById("step-fwd-btn").addEventListener("click", () => {
  if (stepIndex < steps.length - 1) {
    stepIndex++;
    updateStepUI();
    switchTab("env");
  }
});

document.getElementById("step-back-btn").addEventListener("click", () => {
  if (stepIndex > 0) {
    stepIndex--;
    updateStepUI();
    switchTab("env");
  }
});

document.getElementById("step-reset-btn").addEventListener("click", () => {
  stepIndex = 0;
  updateStepUI();
  switchTab("env");
});

// Run button
document.getElementById("run-btn").addEventListener("click", runCode);
</script>
</body>
